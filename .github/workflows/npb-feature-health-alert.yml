name: NPB Feature Health Alert

# Check runtime health of main user-facing features (image-gen / news-feed /
# commentator-ranking) and auto-open a GitHub Issue when one breaks.
# Mirrors npb-scrape-alert.yml but for UI features instead of scrapers.

on:
  push:
    branches: [main, dev]
  schedule:
    # 30 min cadence, same window as scrape-alert (JST 13:30-23:59 = UTC 04:30-14:59)
    - cron: "15 4-14 * * *"
  workflow_dispatch:

concurrency:
  group: npb-feature-health-alert
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  push-noop:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Scheduled feature-health alert workflow; push event is a no-op."

  check-and-alert:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch feature health
        id: health
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.NPB_SITE_URL }}/api/cron/feature-health")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP: $STATUS"
          echo "$BODY" > /tmp/feature-health.json
          cat /tmp/feature-health.json

          if [ "$STATUS" != "200" ]; then
            echo "::warning::feature-health endpoint returned $STATUS"
            exit 0
          fi

          NEEDS_ATTENTION=$(jq '.needsAttention | length' /tmp/feature-health.json)
          echo "needs_attention=$NEEDS_ATTENTION" >> $GITHUB_OUTPUT

      - name: Open / update issues per failing feature
        if: steps.health.outputs.needs_attention != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -c '.needsAttention[]' /tmp/feature-health.json | while read -r src; do
            SOURCE=$(echo "$src" | jq -r '.source')
            ERROR=$(echo "$src" | jq -r '.latestError // "unknown"')
            AT=$(echo "$src" | jq -r '.latestAt // "unknown"')
            DETAIL=$(echo "$src" | jq -c '.detail // {}')

            LABEL="feature:${SOURCE}"
            EXISTING=$(gh issue list --label "auto-generated" --label "$LABEL" --state open --json number -L 1 | jq 'length')
            if [ "$EXISTING" -gt 0 ]; then
              NUM=$(gh issue list --label "auto-generated" --label "$LABEL" --state open --json number -L 1 | jq -r '.[0].number')
              echo "ТЌбтГў Issue #$NUM сЂѓсѓісђЂсѓ│сЃАсЃ│сЃѕУ┐йУеў"
              gh issue comment "$NUM" --body "­Ъћћ СИЇтЂЦтЁеуХЎуХџ: $AT / error: \`$ERROR\`"
              continue
            fi

            cat > /tmp/issue_body.md <<EOF
          ## ТЕЪУЃйсЂ«СИЇтЂЦтЁесѓњТцюуЪЦсЂЌсЂЙсЂЌсЂЪ

          - **feature**: \`$SOURCE\`
          - **ТюђухѓсЃЂсѓДсЃЃсѓ»**: $AT

          ### сѓесЃЕсЃ╝сЃАсЃЃсѓ╗сЃ╝сѓИ
          \`\`\`
          $ERROR
          \`\`\`

          ### УЕ│у┤░
          \`\`\`json
          $DETAIL
          \`\`\`

          ### С┐«тЙЕТЅІжаєсЂ«сЃњсЃ│сЃѕ

          УЕ▓тйЊТЕЪУЃйсЂћсЂесЂФуб║УфЇсЂЎсѓІсЃЋсѓАсѓцсЃФсЂ»С╗ЦСИІсЂ«сЂѓсЂЪсѓі:

          - \`image-gen\` Рєњ \`src/app/api/og/[type]/route.tsx\`, \`src/components/PredictionImageGenerator.tsx\`
          - \`news-feed\` Рєњ \`src/lib/news-feed.ts\`, \`src/app/news/NewsClient.tsx\`
          - \`commentator-ranking\` Рєњ \`src/app/rankings/commentators/\`, \`src/lib/scoring.ts\`

          1. сЃГсЃ╝сѓФсЃФсЂДтєЇуЈЙ: \`npm run dev\` Рєњ \`/api/cron/feature-health\` сѓњтЈЕсЂЈ
          2. УЕ▓тйЊт«ЪУБЁсЂесЃєсѓ╣сЃѕсѓњС┐«ТГБ
          3. \`npx playwright test e2e/\${SOURCE}.e2e.ts\` сЂїжђџсѓІсЂЙсЂД
          4. typecheck + vitest Рєњ PR Рєњ merge Рєњ ТгАтЏъ cron сЂДУЄфтІЋ close

          ### br уЎ╗жї▓№╝ѕсЃГсЃ╝сѓФсЃФсѓесЃ╝сѓИсѓДсЃ│сЃѕтљЉсЂЉ№╝Ѕ
          \`\`\`bash
          br create --title "featureС┐«тЙЕ: $SOURCE" --labels "needs-fix,feature,auto" --priority 1
          \`\`\`

          ---
          ­Ъцќ УЄфтІЋућЪТѕљ by \`npb-feature-health-alert.yml\`
          EOF

            gh issue create \
              --title "[auto] ТЕЪУЃйСИЇтЂЦтЁе: $SOURCE" \
              --body-file /tmp/issue_body.md \
              --label "auto-generated,feature,needs-fix,$LABEL"
          done

      - name: Auto-close resolved feature issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -c '.allSources[] | select(.healthy == true)' /tmp/feature-health.json | while read -r src; do
            SOURCE=$(echo "$src" | jq -r '.source')
            LABEL="feature:${SOURCE}"
            OPEN_NUMS=$(gh issue list --label "auto-generated" --label "$LABEL" --state open --json number -L 20 | jq -r '.[].number')
            for NUM in $OPEN_NUMS; do
              gh issue comment "$NUM" --body "РюЁ тЙЕТЌДсѓњуб║УфЇсђѓУЄфтІЋсѓ»сЃГсЃ╝сѓ║сЂЌсЂЙсЂЎсђѓ"
              gh issue close "$NUM"
            done
          done
