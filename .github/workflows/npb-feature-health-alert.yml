name: NPB Feature Health Alert

# Check runtime health of main user-facing features (image-gen / news-feed /
# commentator-ranking) and auto-open a GitHub Issue when one breaks.
# Mirrors npb-scrape-alert.yml but for UI features instead of scrapers.

on:
  push:
    branches: [main, dev]
  schedule:
    # 30 min cadence, same window as scrape-alert (JST 13:30-23:59 = UTC 04:30-14:59)
    - cron: "15 4-14 * * *"
  workflow_dispatch:

concurrency:
  group: npb-feature-health-alert
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  push-noop:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Scheduled feature-health alert workflow; push event is a no-op."

  check-and-alert:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch feature health
        id: health
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.NPB_SITE_URL }}/api/cron/feature-health")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP: $STATUS"
          echo "$BODY" > /tmp/feature-health.json
          cat /tmp/feature-health.json

          if [ "$STATUS" != "200" ]; then
            echo "::warning::feature-health endpoint returned $STATUS"
            exit 0
          fi

          NEEDS_ATTENTION=$(jq '.needsAttention | length' /tmp/feature-health.json)
          echo "needs_attention=$NEEDS_ATTENTION" >> $GITHUB_OUTPUT

      - name: Open / update issues per failing feature
        if: steps.health.outputs.needs_attention != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"
            if ! gh label list --search "$name" --json name --jq '.[].name' | grep -Fxq "$name"; then
              gh label create "$name" --color "$color" --description "$description" || \
                gh label list --search "$name" --json name --jq '.[].name' | grep -Fxq "$name"
            fi
          }

          ensure_label "auto-generated" "ededed" "Created or maintained by automation"
          ensure_label "feature" "1d76db" "Feature health alert"
          ensure_label "needs-fix" "d73a4a" "Requires a code or operations fix"

          jq -c '.needsAttention[]' /tmp/feature-health.json | while read -r src; do
            SOURCE=$(echo "$src" | jq -r '.source')
            ERROR=$(echo "$src" | jq -r '.latestError // "unknown"')
            AT=$(echo "$src" | jq -r '.latestAt // "unknown"')
            DETAIL=$(echo "$src" | jq -c '.detail // {}')

            LABEL="feature:${SOURCE}"
            ensure_label "$LABEL" "5319e7" "Feature health source: ${SOURCE}"
            EXISTING=$(gh issue list --label "auto-generated" --label "$LABEL" --state open --json number -L 1 | jq 'length')
            if [ "$EXISTING" -gt 0 ]; then
              NUM=$(gh issue list --label "auto-generated" --label "$LABEL" --state open --json number -L 1 | jq -r '.[0].number')
              echo "жЧҐе≠Ш Issue #$NUM гБВгВКгАБгВ≥гГ°гГ≥гГИињљи®Ш"
              gh issue comment "$NUM" --body "рЯФФ дЄНеБ•еЕ®зґЩзґЪ: $AT / error: \`$ERROR\`"
              continue
            fi

            cat > /tmp/issue_body.md <<EOF
          ## ж©ЯиГљгБЃдЄНеБ•еЕ®гВТж§ЬзЯ•гБЧгБЊгБЧгБЯ

          - **feature**: \`$SOURCE\`
          - **жЬАзµВгГБгВІгГГгВѓ**: $AT

          ### гВ®гГ©гГЉгГ°гГГгВїгГЉгВЄ
          \`\`\`
          $ERROR
          \`\`\`

          ### и©≥зі∞
          \`\`\`json
          $DETAIL
          \`\`\`

          ### дњЃеЊ©жЙЛй†ЖгБЃгГТгГ≥гГИ

          и©≤ељУж©ЯиГљгБФгБ®гБЂзҐЇи™НгБЩгВЛгГХгВ°гВ§гГЂгБѓдї•дЄЛгБЃгБВгБЯгВК:

          - \`image-gen\` вЖТ \`src/app/api/og/[type]/route.tsx\`, \`src/components/PredictionImageGenerator.tsx\`
          - \`news-feed\` вЖТ \`src/lib/news-feed.ts\`, \`src/app/news/NewsClient.tsx\`
          - \`commentator-ranking\` вЖТ \`src/app/rankings/commentators/\`, \`src/lib/scoring.ts\`

          1. гГ≠гГЉгВЂгГЂгБІеЖНзПЊ: \`npm run dev\` вЖТ \`/api/cron/feature-health\` гВТеП©гБП
          2. и©≤ељУеЃЯи£ЕгБ®гГЖгВєгГИгВТдњЃж≠£
          3. \`npx playwright test e2e/\${SOURCE}.e2e.ts\` гБМйАЪгВЛгБЊгБІ
          4. typecheck + vitest вЖТ PR вЖТ merge вЖТ жђ°еЫЮ cron гБІиЗ™еЛХ close

          ### br зЩїйМ≤пЉИгГ≠гГЉгВЂгГЂгВ®гГЉгВЄгВІгГ≥гГИеРСгБСпЉЙ
          \`\`\`bash
          br create --title "featureдњЃеЊ©: $SOURCE" --labels "needs-fix,feature,auto" --priority 1
          \`\`\`

          ---
          рЯ§Ц иЗ™еЛХзФЯжИР by \`npb-feature-health-alert.yml\`
          EOF

            gh issue create \
              --title "[auto] ж©ЯиГљдЄНеБ•еЕ®: $SOURCE" \
              --body-file /tmp/issue_body.md \
              --label "auto-generated,feature,needs-fix,$LABEL"
          done

      - name: Auto-close resolved feature issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"
            if ! gh label list --search "$name" --json name --jq '.[].name' | grep -Fxq "$name"; then
              gh label create "$name" --color "$color" --description "$description" || \
                gh label list --search "$name" --json name --jq '.[].name' | grep -Fxq "$name"
            fi
          }

          ensure_label "auto-generated" "ededed" "Created or maintained by automation"
          jq -c '.allSources[] | select(.healthy == true)' /tmp/feature-health.json | while read -r src; do
            SOURCE=$(echo "$src" | jq -r '.source')
            LABEL="feature:${SOURCE}"
            ensure_label "$LABEL" "5319e7" "Feature health source: ${SOURCE}"
            OPEN_NUMS=$(gh issue list --label "auto-generated" --label "$LABEL" --state open --json number -L 20 | jq -r '.[].number')
            for NUM in $OPEN_NUMS; do
              gh issue comment "$NUM" --body "вЬЕ еЊ©жЧІгВТзҐЇи™НгАВиЗ™еЛХгВѓгГ≠гГЉгВЇгБЧгБЊгБЩгАВ"
              gh issue close "$NUM"
            done
          done
