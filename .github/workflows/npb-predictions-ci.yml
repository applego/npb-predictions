name: CI / Deploy

on:
  push:
    branches: [main, dev]
    paths:
      - 'web/**'
      - '.github/workflows/npb-predictions-ci.yml'
      - '.github/hooks/**'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/npb-predictions-ci.yml'
      - '.github/hooks/**'

defaults:
  run:
    working-directory: web

jobs:
  ci:
    # 2026-05-17: self-hosted runner (mac-2016-intel) が長期停止し CI/Deploy が
    # 24時間タイムアウト連発したため ubuntu-latest に切替。durability の代替策は
    # GitHub Hosted Runners の billing 監視 + 別途 cloudflare 側 git 連携を検討。
    runs-on: ubuntu-latest
    # 2026-05-20: NEXT_PUBLIC_FIREBASE_* は next build 時に bundle へ焼き込まれる
    # ため job-level env で全 step に注入。値は GitHub Repository Secrets に保管。
    # (Firebase Web API key は Firebase 仕様上 public で安全、ドメイン制限で保護)
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      WRANGLER_PERSIST_TO: /tmp/npb-e2e-d1-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages

      - name: Performance budget
        run: npm run check:perf-budget

      # 2026-05-23: deploy 前に Playwright E2E スモークを走らせる (永続保証)。
      # 過去 OG 画像が 0B を返す bug を E2E が検知していたのに CI で回って
      # おらず prod に出てしまった反省。落ちたら deploy しない。
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 2026-05-23: E2E は wrangler pages dev (miniflare local D1) を立てる。
      # API route (/api/users/.../history etc) が DB lookup するので、schema
      # を migrate + seed を投入しておかないと 500 で test が落ちる。
      # drizzle/*.sql を順に適用 → src/db/seed-commentators.sql で初期データ。
      - name: Migrate local D1 (schema)
        run: |
          mkdir -p "$WRANGLER_PERSIST_TO"
          for f in drizzle/*.sql; do
            echo "Applying $f"
            timeout 120s npx wrangler d1 execute npb-predictions --local --persist-to "$WRANGLER_PERSIST_TO" --file="$f"
          done

      - name: Seed local D1 (commentators + predictions)
        run: timeout 120s npx wrangler d1 execute npb-predictions --local --persist-to "$WRANGLER_PERSIST_TO" --file=src/db/seed-commentators.sql

      # E2E-only fixture: minimal actual_team_standings rows so the LIVE
      # SCOREBOARD regression guard can assert non-zero scores in CI.
      # Production data is unaffected.
      - name: Seed local D1 (e2e standings fixture)
        run: timeout 120s npx wrangler d1 execute npb-predictions --local --persist-to "$WRANGLER_PERSIST_TO" --file=src/db/fixtures/e2e-standings.sql

      - name: Data correctness gate
        run: npm run validate-data:persisted

      - name: E2E smoke (against built CF Pages output)
        run: npm run test:e2e -- --workers=1

      # wrangler-action v3 は `command` 入力を改行で split して各行を別コマンドとして
      # 実行する。`github.event.head_commit.message` は squash merge 時に commit body
      # まで含んで複数行になり、2行目以降が `npx wrangler <body行>` として実行されて
      # exit 1 する (旧 monorepo run #24969115153 で発生)。1行目だけ抽出し、shell 特殊文字も剥ぐ。
      - name: Sanitize commit message
        id: commit_msg
        env:
          RAW_MSG: ${{ github.event.head_commit.message }}
        run: |
          first_line=$(printf '%s' "$RAW_MSG" | head -n1 | tr -d '"`$\\')
          if [ -z "$first_line" ]; then
            first_line="${{ github.sha }}"
          fi
          echo "msg=$first_line" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages (dev)
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=npb-predictions --commit-dirty=true --commit-message="${{ steps.commit_msg.outputs.msg }}"
          workingDirectory: web

      - name: Deploy to Cloudflare Pages (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=npb-predictions --branch=main --commit-dirty=true --commit-message="${{ steps.commit_msg.outputs.msg }}"
          workingDirectory: web
