name: CI / Deploy

on:
  push:
    branches: [main, dev]
    paths:
      - 'companies/npb-predictions/web/**'
  pull_request:
    branches: [main]
    paths:
      - 'companies/npb-predictions/web/**'

defaults:
  run:
    working-directory: companies/npb-predictions/web

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: companies/npb-predictions/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Pages (dev)
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=npb-predictions --commit-dirty=true --commit-message="${{ github.event.head_commit.message }}"
          workingDirectory: companies/npb-predictions/web

      - name: Deploy to Cloudflare Pages (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=npb-predictions --branch=main --commit-dirty=true --commit-message="${{ github.event.head_commit.message }}"
          workingDirectory: companies/npb-predictions/web
