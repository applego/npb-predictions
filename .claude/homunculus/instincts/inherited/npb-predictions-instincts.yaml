# Npb Predictions Workflow Api Cron Route Hardening

## Action

Follow the api-cron-route-hardening workflow:
1. Identify issue in one or more cron API routes (e.g., env access, error handling, DB limits).
2. Edit one or more files under web/src/app/api/cron/*/route.ts to address the problem.
3. Optionally, add or update a shared helper in web/src/lib/ (e.g., cron-auth.ts).
4. Commit changes, often with detailed commit messages referencing the specific cron route(s) affected.

## Evidence

